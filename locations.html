<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locations | MineRiseNodes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .text-gradient { background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .node-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .node-card:hover { border-color: #3b82f6; transform: scale(1.02); background: rgba(30, 41, 59, 0.6); }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass border-b border-white/5 py-6">
        <div class="max-w-[1400px] mx-auto px-10 flex justify-between items-center">
            <a href="index.html" class="text-3xl font-black tracking-tighter italic">MINE<span class="text-blue-500">RISE</span></a>
            <div class="hidden md:flex space-x-12 text-sm font-bold uppercase tracking-[0.3em] text-gray-400">
                <a href="index.html" class="hover:text-white transition">Home</a>
                <a href="plans.html" class="hover:text-white transition">Plans</a>
                <a href="locations.html" class="text-white border-b-2 border-blue-500 pb-2">Locations</a>
                <a href="status.html" class="hover:text-white transition">Status</a>
            </div>
            <div class="w-32"></div> </div>
    </nav>

    <header class="pt-32 pb-20 px-10 text-center">
        <h1 class="text-6xl md:text-9xl font-black uppercase italic tracking-tighter mb-8">Global <span class="text-gradient">Reach</span></h1>
        <p class="text-gray-500 max-w-4xl mx-auto text-xl font-medium">Test your connection to our high-performance Ryzen 9 clusters in real-time.</p>
    </header>

    <section class="max-w-[1400px] mx-auto py-12 px-10 grid md:grid-cols-2 gap-12 mb-24">
        
        <div class="glass node-card p-12 rounded-[50px] border border-white/5 relative overflow-hidden">
            <div class="flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="text-center md:text-left">
                    <img src="https://flagcdn.com/de.svg" class="w-20 mb-6 rounded shadow-2xl" alt="Germany">
                    <h3 class="text-4xl font-black italic tracking-tight">FRANKFURT</h3>
                    <p class="text-blue-500 font-black text-sm uppercase tracking-widest mt-2">Central Europe Node</p>
                </div>
                <div class="bg-black/40 p-8 rounded-[30px] border border-white/5 min-w-[200px] text-center">
                    <p class="text-[10px] text-gray-500 font-black uppercase mb-2">Your Latency</p>
                    <p id="ping-de" class="text-5xl font-black text-green-400">--ms</p>
                </div>
            </div>
            <div class="mt-10 grid grid-cols-2 gap-4">
                <div class="bg-white/5 p-4 rounded-2xl text-center"><p class="text-[10px] text-gray-500 font-bold uppercase">Uplink</p><p class="font-black">10Gbps</p></div>
                <div class="bg-white/5 p-4 rounded-2xl text-center"><p class="text-[10px] text-gray-500 font-bold uppercase">CPU</p><p class="font-black">7950X</p></div>
            </div>
        </div>

        <div class="glass node-card p-12 rounded-[50px] border border-white/5 relative overflow-hidden">
            <div class="flex flex-col md:flex-row items-center justify-between gap-8">
                <div class="text-center md:text-left">
                    <img src="https://flagcdn.com/sg.svg" class="w-20 mb-6 rounded shadow-2xl" alt="Singapore">
                    <h3 class="text-4xl font-black italic tracking-tight">SINGAPORE</h3>
                    <p class="text-blue-500 font-black text-sm uppercase tracking-widest mt-2">Asia-Pacific Node</p>
                </div>
                <div class="bg-black/40 p-8 rounded-[30px] border border-white/5 min-w-[200px] text-center">
                    <p class="text-[10px] text-gray-500 font-black uppercase mb-2">Your Latency</p>
                    <p id="ping-sg" class="text-5xl font-black text-green-400">--ms</p>
                </div>
            </div>
            <div class="mt-10 grid grid-cols-2 gap-4">
                <div class="bg-white/5 p-4 rounded-2xl text-center"><p class="text-[10px] text-gray-500 font-bold uppercase">Uplink</p><p class="font-black">10Gbps</p></div>
                <div class="bg-white/5 p-4 rounded-2xl text-center"><p class="text-[10px] text-gray-500 font-bold uppercase">CPU</p><p class="font-black">7950X</p></div>
            </div>
        </div>

    </section>

    <script>
        // Simple Ping Simulation (Replace URL with your actual server IP/Files for real results)
        function measurePing(elementId, testUrl) {
            const start = Date.now();
            fetch(testUrl, { mode: 'no-cors', cache: 'no-cache' })
            .then(() => {
                const delta = Date.now() - start;
                document.getElementById(elementId).innerText = delta + "ms";
            })
            .catch(() => {
                // If it fails (due to no-cors/offline), we still get a rough timing from the catch block
                const delta = Date.now() - start;
                document.getElementById(elementId).innerText = delta + "ms";
            });
        }
        
        // You would use actual server addresses here
        setInterval(() => {
            measurePing('ping-de', 'https://de-frankfurt.example.com/ping');
            measurePing('ping-sg', 'https://sg-singapore.example.com/ping');
        }, 3000);
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status | MineRiseNodes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .status-bar { height: 40px; width: 6px; border-radius: 4px; background: #22c55e; }
        .text-gradient { background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <nav class="sticky top-0 z-50 glass border-b border-white/5 py-6 px-10">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center">
            <a href="index.html" class="text-3xl font-black tracking-tighter italic">MINE<span class="text-blue-500">RISE</span></a>
            <div class="hidden md:flex space-x-12 text-sm font-bold uppercase tracking-[0.3em] text-gray-400">
                <a href="index.html" class="hover:text-white transition">Home</a>
                <a href="plans.html" class="hover:text-white transition">Plans</a>
                <a href="locations.html" class="hover:text-white transition">Locations</a>
                <a href="status.html" class="text-white border-b-2 border-blue-500 pb-2">Status</a>
            </div>
            <div class="w-32"></div>
        </div>
    </nav>

    <section class="max-w-[1200px] mx-auto pt-32 px-10">
        <div class="glass p-16 rounded-[60px] border border-green-500/20 mb-16 flex flex-col md:flex-row items-center justify-between text-center md:text-left gap-10">
            <div class="flex items-center gap-10">
                <div class="w-8 h-8 bg-green-500 rounded-full shadow-[0_0_30px_rgba(34,197,94,0.6)] animate-pulse"></div>
                <div>
                    <h2 class="text-5xl font-black uppercase italic tracking-tighter mb-2">All Nodes <span class="text-gradient">Green</span></h2>
                    <p class="text-gray-500 text-sm font-bold uppercase tracking-[0.4em]">Infrastructure Monitoring v2.4</p>
                </div>
            </div>
            <div class="text-right">
                <span class="text-7xl font-black tracking-tighter italic">99.99%</span>
            </div>
        </div>

        <div class="space-y-12 mb-40">
            <div class="glass p-12 rounded-[40px] border border-white/5">
                <div class="flex justify-between items-end mb-10">
                    <h3 class="font-black italic text-3xl tracking-tight uppercase">DE-Frankfurt-Cluster</h3>
                    <span class="text-green-400 font-black text-sm uppercase tracking-widest bg-green-500/10 px-6 py-2 rounded-full border border-green-500/20">Operational</span>
                </div>
                <div class="flex gap-2 overflow-hidden justify-between">
                    <script>for(let i=0; i<80; i++) document.write('<div class="status-bar opacity-' + (i < 78 ? '100' : '40') + '"></div>');</script>
                </div>
            </div>

            <div class="glass p-12 rounded-[40px] border border-white/5">
                <div class="flex justify-between items-end mb-10">
                    <h3 class="font-black italic text-3xl tracking-tight uppercase">SG-Singapore-Cluster</h3>
                    <span class="text-green-400 font-black text-sm uppercase tracking-widest bg-green-500/10 px-6 py-2 rounded-full border border-green-500/20">Operational</span>
                </div>
                <div class="flex gap-2 overflow-hidden justify-between">
                    <script>for(let i=0; i<80; i++) document.write('<div class="status-bar opacity-100"></div>');</script>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
